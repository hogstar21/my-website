<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .image-card img {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
        }

        .image-info {
            padding: 20px;
        }

        .image-info h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.2em;
        }

        .image-info p {
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
        }


        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            z-index: 1001;
        }
    </style>
</head>
<body>
     <!-- 🌐 Navigation Bar -->
    <nav style="
      background:#fff;
      padding:10px 16px;
      border-bottom:1px solid #ddd;
      display:flex;
      gap:16px;
      font-family:system-ui,Segoe UI,Roboto,Arial;
    ">
      <a href="index.html" style="text-decoration:none;color:#0070f3;">Home</a>
      <a href="local-posts-viewer.html" style="text-decoration:none;color:#0070f3;">Posts Viewer</a>
	  <a href="Pics.html" style="text-decoration:none;color:#0070f3;">Pics</a>
    </nav>
    <div class="container">
        <h1>📸 My Image Gallery</h1>
        
        <div class="gallery" id="gallery">
            <div class="image-card">
                <img src="images/THE%20WORLD%20AHEAD%202026.jpg" alt="The Economist - The World Ahead 2026" onclick="openModal(this)">
                <div class="image-info">
                    <h3>The World Ahead 2026</h3>
                    <p>The Economist magazine cover featuring predictions and themes for 2026</p>
                </div>
            </div>
        </div>


    </div>

    <div class="modal" id="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImg" src="" alt="">
    </div>

    <script>
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');

        function openModal(img) {
            modal.classList.add('active');
            modalImg.src = img.src;
        }

        function closeModal() {
            modal.classList.remove('active');
        }
    </script>
</body>
</html>
