name: WW3 Tracker Hourly Update

on:
  schedule:
    # Test run at 12:30 AM EDT (04:30 UTC)
    - cron: '30 4 * * *'
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write   # needed to push the updated HTML back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_ww3.py

      - name: Commit and push updated files
        run: |
          git config user.name  "WW3 Tracker Bot"
          git config user.email "bot@github-actions"
          git add ww3-tracker.html claims.json
          git diff --staged --quiet || git commit -m "Auto-update: WW3 tracker $(date -u +%Y-%m-%d)"
          git push
