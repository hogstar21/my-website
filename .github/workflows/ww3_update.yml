name: WW3 Tracker Hourly Update

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python update_ww3.py

      - name: Commit and push
        run: |
          git config user.name "WW3 Tracker Bot"
          git config user.email "bot@github-actions"
          git add ww3-tracker.html claims.json
          git diff --staged --quiet || git commit -m "Auto-update: WW3 tracker $(date -u +%Y-%m-%d)"
          git push
