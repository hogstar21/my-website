<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Calendar Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #fff;
            padding: 10px 16px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 16px;
            font-family: system-ui, Segoe UI, Roboto, Arial;
        }

        nav a {
            text-decoration: none;
            color: #0070f3;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .clock-wrapper {
            position: relative;
            width: 800px;
            height: 800px;
            overflow: hidden;
        }

        .calendar-clock {
            width: 200%;
            height: 200%;
            position: absolute;
            top: 50%;
            left: 50%;
            transition: transform 0.5s ease-out;
            transform-origin: center center;
        }

        .marker {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 80px;
            background: red;
            box-shadow: 0 0 10px rgba(255,0,0,0.8);
            z-index: 10;
        }

        .info {
            margin-top: 40px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            text-align: center;
        }

        .info h2 {
            font-size: 2em;
            margin: 10px 0;
        }

        .info p {
            font-size: 1.2em;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="local-posts-viewer.html">Posts Viewer</a>
        <a href="Pics.html">Pics</a>
        <a href="clock.html">Clock</a>
    </nav>
    
    <div class="container">
        <div class="clock-wrapper">
            <div class="marker"></div>
            <img src="images/calendar-wheel.png" alt="Year Calendar" class="calendar-clock" id="calendarClock">
        </div>
        <div class="info">
            <h2 id="currentDate"></h2>
            <p id="dayOfYear"></p>
            <p id="rotationAngle"></p>
        </div>
    </div>

    <script>
        function updateCalendarRotation() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const dayOfYear = Math.floor((now - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
            
            // Check if leap year
            const isLeapYear = (now.getFullYear() % 4 === 0 && now.getFullYear() % 100 !== 0) || (now.getFullYear() % 400 === 0);
            const daysInYear = isLeapYear ? 366 : 365;
            
            // Calculate rotation angle
            const degreesPerDay = 360 / daysInYear;
            const rotation = -(dayOfYear - 1) * degreesPerDay;
            
            // Apply rotation to the image
            const clockImg = document.getElementById('calendarClock');
            clockImg.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            
            // Update info display
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            document.getElementById('dayOfYear').textContent = `Day ${dayOfYear} of ${daysInYear}`;
            document.getElementById('rotationAngle').textContent = `Rotation: ${rotation.toFixed(2)}°`;
        }

        // Update on load
        updateCalendarRotation();
        
        // Update every hour
        setInterval(updateCalendarRotation, 3600000);
        
        // Update at midnight
        function scheduleNextMidnight() {
            const now = new Date();
            const night = new Date(
                now.getFullYear(),
                now.getMonth(),
                now.getDate() + 1,
                0, 0, 0
            );
            const msToMidnight = night.getTime() - now.getTime();
            
            setTimeout(function() {
                updateCalendarRotation();
                scheduleNextMidnight();
            }, msToMidnight);
        }
        
        scheduleNextMidnight();
    </script>
</body>
</html>
